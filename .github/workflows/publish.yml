name: 🚀 Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Required for provenance signature even with secret-based auth
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version || true

      - name: Build library
        run: npm run build

      - name: Publish to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --access public

      - name: Verify published package
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir ../verify-install
          cd ../verify-install
          echo "@gnuton:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc
          npm init -y
          
          echo "Waiting for registry propagation..."
          # Use a retry loop (5 attempts, 5s delay) to handle registry lag more gracefully
          for i in {1..5}; do
            npm install @gnuton/css-dice-roller@$VERSION --no-package-lock && break || {
              if [ $i -eq 5 ]; then echo "Failed to install after 5 attempts"; exit 1; fi
              echo "Install failed, retrying in 5 seconds... (Attempt $i/5)"
              sleep 5
            }
          done
          
          echo "Verifying installed files..."
          # List the contents of the dist folder for the log
          ls -R node_modules/@gnuton/css-dice-roller/dist
          
          # Assert that critical files exist (matching package.json entry points)
          test -f node_modules/@gnuton/css-dice-roller/dist/style.css
          test -f node_modules/@gnuton/css-dice-roller/dist/css-dice-roller.js
          test -f node_modules/@gnuton/css-dice-roller/dist/css-dice-roller.umd.cjs
          test -f node_modules/@gnuton/css-dice-roller/dist/index.d.ts
