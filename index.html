<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Master of Dice | 3D CSS Polyhedral Simulator</title>
    <meta name="description" content="A high-performance, 3D polyhedral dice roller built with CSS transforms. Experience realistic tumbles, chaotic spins, and ethereal floats for your favorite tabletop games.">
    <meta name="keywords" content="dice roller, 3D dice, CSS transforms, tabletop gaming, polyhedral dice, RPG tool">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Configuration</h2>
          <p>Tweak your simulation</p>
        </div>
        
        <div class="control-group">
          <label for="theme-select">Visual Theme</label>
          <select id="theme-select">
            <!-- Populated dynamically from THEMES -->
          </select>
        </div>

        <div class="control-group">
          <label for="color-picker">Primary Color</label>
          <div class="color-picker-wrapper">
            <input type="color" id="color-picker" value="#10b981">
            <span id="color-value">#10b981</span>
          </div>
        </div>

        <div class="control-group">
          <label for="secondary-color-picker">Secondary Color</label>
          <div class="color-picker-wrapper">
            <input type="color" id="secondary-color-picker" value="#064e3b">
            <span id="secondary-color-value">#064e3b</span>
          </div>
        </div>

        <div class="control-group">
          <label for="text-color-picker">Text Color</label>
          <div class="color-picker-wrapper">
            <input type="color" id="text-color-picker" value="#ffffff">
            <span id="text-color-value">#ffffff</span>
          </div>
        </div>

        <div class="control-group">
          <label for="scale-slider">Dice Scale (<span id="scale-value">110</span>px)</label>
          <input type="range" id="scale-slider" min="50" max="300" value="110">
        </div>
        
        <div class="control-group">
          <label for="text-scale-slider">Text Scale (<span id="text-scale-value">1.0</span>x)</label>
          <input type="range" id="text-scale-slider" min="0.5" max="1.5" step="0.01" value="1.0">
        </div>

        <div class="control-group">
          <label for="animation-select">Roll Animation</label>
          <select id="animation-select">
            <option value="standard" selected>Standard Tumble</option>
            <option value="chaotic">Chaotic Spin</option>
            <option value="float">Ethereal Float</option>
            <option value="demo">Continuous Demo</option>
            <option value="none">Instant Result</option>
          </select>
        </div>

        <div class="control-group-row">
          <label for="constant-spin">Constant Idle Spin</label>
          <div class="toggle-wrapper">
            <input type="checkbox" id="constant-spin">
          </div>
        </div>

        <div class="control-group-row">
          <label for="random-animation">Randomize Each Die</label>
          <div class="toggle-wrapper">
            <input type="checkbox" id="random-animation">
          </div>
        </div>

        <div class="control-group-row">
          <label for="drag-mode">Drag & Rotate Mode</label>
          <div class="toggle-wrapper">
            <input type="checkbox" id="drag-mode">
          </div>
        </div>

        <div class="control-group-row">
          <label for="custom-symbols">Custom Symbols (D6)</label>
          <div class="toggle-wrapper">
            <input type="checkbox" id="custom-symbols">
          </div>
        </div>

        <div class="control-group">
          <label for="speed-slider">Animation Duration (<span id="speed-value">2.5</span>s)</label>
          <input type="range" id="speed-slider" min="0.5" max="5.0" step="0.1" value="2.5">
        </div>

        <div class="sidebar-footer">
          <button id="reset-settings" class="btn btn-ghost">Reset to Defaults</button>
          <div class="quick-install" id="copy-install">
            <span class="label">Instant Install</span>
            <code>npm i @gnuton/css-dice-roller</code>
          </div>
        </div>
      </aside>

      <div class="main-content">
        <header>
          <div class="header-left">
            <h1>Master of Dice</h1>
            <p>A Professional Polyhedral Simulation Toolkit</p>
          </div>
          <div id="results-display">
            <span class="label">Collection Result</span>
            <span id="total-sum">0</span>
          </div>
        </header>
        
        <main>
          <div id="dice-container-wrapper">
            <div id="dice-container"></div>
          </div>
        </main>

        <footer>
          <div class="controls">
            <div class="btn-group">
              <button id="add-d4" class="btn btn-die">D4</button>
              <button id="add-d6" class="btn btn-die">D6</button>
              <button id="add-d8" class="btn btn-die">D8</button>
              <button id="add-d10" class="btn btn-die">D10</button>
              <button id="add-d12" class="btn btn-die">D12</button>
              <button id="add-d20" class="btn btn-die">D20</button>
            </div>
            <div class="divider"></div>
            <div class="btn-group">
              <button id="roll-all" class="btn btn-primary">Roll All</button>
              <button id="clear" class="btn btn-danger">Clear Deck</button>
            </div>
          </div>
          <div class="footer-links">
            <a href="https://github.com/gnuton/css-dice-roller" target="_blank" rel="noopener">GitHub</a>
            <a href="https://github.com/gnuton/css-dice-roller/pkgs/npm/css-dice-roller" target="_blank" rel="noopener">Packages</a>
            <span id="app-version"></span>
          </div>
        </footer>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
